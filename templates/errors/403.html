<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>403 — Access Forbidden</title>
  <script>if(localStorage.getItem('theme')==='light')document.documentElement.classList.remove('dark');</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:"class",theme:{extend:{colors:{primary:"#0d33f2"},fontFamily:{display:["Inter","system-ui","sans-serif"],mono:["JetBrains Mono","monospace"]}}}}</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
</head>
<body class="bg-[#f5f6f8] dark:bg-[#121212] text-gray-900 dark:text-gray-100 font-display min-h-screen flex items-center justify-center px-6">
  <div class="text-center max-w-md">
    <div class="w-16 h-16 mx-auto mb-6 rounded-xl bg-orange-500/10 border border-orange-500/20 flex items-center justify-center">
      <span class="material-icons-outlined text-3xl text-orange-500">shield</span>
    </div>
    <p class="font-mono text-xs text-primary tracking-widest uppercase mb-2">Error 403</p>
    <h1 class="text-4xl font-bold text-gray-900 dark:text-white mb-3">Access Forbidden</h1>
    <p class="text-gray-500 dark:text-gray-400 mb-8">You don't have permission to access this resource.</p>
    <a href="/" class="inline-flex items-center gap-2 px-6 py-3 bg-primary hover:bg-[#0a25b0] text-white text-sm font-medium rounded-md transition-colors">
      <span class="material-icons-outlined text-sm">arrow_back</span>Go Home
    </a>
  </div>
</body>
</html>
